<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <defs>
    <!-- Primary Red Gradient -->
    <linearGradient id="primaryRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D5E" />
      <stop offset="100%" stop-color="#E63946" />
    </linearGradient>
    
    <!-- Accent Red for depth -->
    <linearGradient id="accentRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C52835" />
      <stop offset="100%" stop-color="#E63946" />
    </linearGradient>

    <!-- White gradient for seams -->
    <linearGradient id="whiteSeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    
    <!-- Drop Shadow for premium depth -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#E63946" flood-opacity="0.3" />
    </filter>

    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Left Side: Emblem -->
  <g transform="translate(180, 150) scale(0.85)">
    <!-- Outer Pill Shape Border -->
    <rect x="-100" y="-140" width="200" height="280" rx="100" ry="100" fill="none" stroke="url(#primaryRed)" stroke-width="16" filter="url(#premiumShadow)" />
    
    <!-- Cricket Ball -->
    <circle cx="0" cy="-40" r="55" fill="url(#primaryRed)" />
    
    <!-- Ball Seams -->
    <!-- Vertical Seam lines -->
    <rect x="-10" y="-95" width="4" height="110" fill="url(#whiteSeam)" />
    <rect x="6" y="-95" width="4" height="110" fill="url(#whiteSeam)" />
    
    <!-- Horizontal Stitch marks -->
    <rect x="-16" y="-80" width="32" height="4" fill="url(#whiteSeam)" />
    <rect x="-16" y="-65" width="32" height="4" fill="url(#whiteSeam)" />
    <rect x="-16" y="-50" width="32" height="4" fill="url(#whiteSeam)" />
    <rect x="-16" y="-35" width="32" height="4" fill="url(#whiteSeam)" />
    <rect x="-16" y="-20" width="32" height="4" fill="url(#whiteSeam)" />
    <rect x="-16" y="-5" width="32" height="4" fill="url(#whiteSeam)" />

    <!-- Downward Speed/Auction Hammer effect -->
    <path d="M-55 -40 L-55 80 L-25 40 L0 100 L25 40 L55 80 L55 -40 Z" fill="url(#accentRed)" />
  </g>

  <!-- Right Side: Typography -->
  <g transform="translate(320, 185)">
    <text x="0" y="0" font-family="'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, sans-serif" font-size="130" font-weight="900" letter-spacing="4" fill="#FFFFFF" filter="url(#textShadow)">
      CRIC<tspan fill="url(#primaryRed)">BID</tspan><tspan fill="url(#primaryRed)" font-size="140">.</tspan>
    </text>
  </g>
</svg>