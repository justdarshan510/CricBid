<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Primary Red Gradient -->
    <linearGradient id="primaryRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D5E" />
      <stop offset="100%" stop-color="#E63946" />
    </linearGradient>
    
    <!-- Accent Red for depth -->
    <linearGradient id="accentRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C52835" />
      <stop offset="100%" stop-color="#E63946" />
    </linearGradient>

    <!-- White gradient for seams -->
    <linearGradient id="whiteSeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    
    <!-- Drop Shadow for premium depth -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#E63946" flood-opacity="0.35" />
    </filter>
  </defs>

  <g transform="translate(128, 128) scale(0.65)">
    <!-- Outer Pill Shape Border -->
    <rect x="-100" y="-140" width="200" height="280" rx="100" ry="100" fill="none" stroke="url(#primaryRed)" stroke-width="20" filter="url(#premiumShadow)" />
    
    <!-- Cricket Ball -->
    <circle cx="0" cy="-40" r="55" fill="url(#primaryRed)" />
    
    <!-- Ball Seams - Simplified for small sizes -->
    <!-- Vertical Seam lines -->
    <rect x="-12" y="-95" width="6" height="110" fill="url(#whiteSeam)" />
    <rect x="6" y="-95" width="6" height="110" fill="url(#whiteSeam)" />
    
    <!-- Horizontal Stitch marks -->
    <rect x="-20" y="-80" width="40" height="6" fill="url(#whiteSeam)" />
    <rect x="-20" y="-60" width="40" height="6" fill="url(#whiteSeam)" />
    <rect x="-20" y="-40" width="40" height="6" fill="url(#whiteSeam)" />
    <rect x="-20" y="-20" width="40" height="6" fill="url(#whiteSeam)" />

    <!-- Downward Speed/Auction Hammer effect -->
    <path d="M-55 -40 L-55 80 L-25 40 L0 100 L25 40 L55 80 L55 -40 Z" fill="url(#accentRed)" />
  </g>
</svg>